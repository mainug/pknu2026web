<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      h2 {
        background-color: yellow;
        color: lightgreen;
      }
    </style>
  </head>
  <body>
    <h1>forEach 실습</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <h2></h2>
    <h2></h2>
    <h2></h2>
    <h2></h2>
    <h2></h2>
    <script>
      const headers = document.querySelectorAll("h2");
      const color = ["#FFC0CB", "#FFD580", "#A0C4FF", "#FFB347", "#D6BFFF"];
      headers.forEach((header, idx) => {
        header.textContent = "header";
        header.style.color = color[idx];
        header.style.backgroundColor = `rgb(${idx * 50},${idx * 20},${idx * 10})`;
        header.style.padding = "10px";
        header.style.fontSize = "2rem";
      });
    </script>
  </body>
</html>
