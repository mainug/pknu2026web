<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>border</title>
    <style>
      p {
        width: 450px;
        padding: 5px;
      }
      .p1 {
        border: 5px solid lightblue;
      }
      .p2 {
        border: 5px dotted lightblue;
      }
      .p3 {
        border: 5px dashed lightblue;
      }
      .p4 {
        border: 5px groove lightblue;
      }
      .p5 {
        border: 5px ridge lightblue;
      }
      .p6 {
        border: 5px inset lightblue;
      }
      .p7 {
        border: 5px outset lightblue;
      }
      .p8 {
        border: none;
      }
    </style>
  </head>
  <body>
    <h1>border</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <p class="p1">방황했다고 해서 모두가 길을 잃은 것은 아니다.</p>
    <p class="p2">방황했다고 해서 모두가 길을 잃은 것은 아니다.</p>
    <p class="p3">방황했다고 해서 모두가 길을 잃은 것은 아니다.</p>
    <p class="p4">방황했다고 해서 모두가 길을 잃은 것은 아니다.</p>
    <p class="p5">방황했다고 해서 모두가 길을 잃은 것은 아니다.</p>
    <p class="p6">방황했다고 해서 모두가 길을 잃은 것은 아니다.</p>
    <p class="p7">방황했다고 해서 모두가 길을 잃은 것은 아니다.</p>
    <p class="p8">방황했다고 해서 모두가 길을 잃은 것은 아니다.</p>
  </body>
</html>
