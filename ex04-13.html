<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>프사만들기</title>
    <style>
      .container {
        width: 350px;
        height: 350px;
        margin: 50px auto;

        box-shadow: 10px 10px 10px coral;

      img {
        width: 350px;
        height: 350px;
        position: absolute;
        bottom: 10px;
      }
      h2 {
        text-align: center;
      }
    </style>

  <body>
    <h1>프사만들기</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <div class="container">
      <img src="assets/sample.jpg" alt="" />

    <div>
      <h2>마법사 꼬깔콘</h2>
    </div>
  </body>
</html>
