  <body>
    <h1>reduce</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <pre>
        arr.reduce((<mark>누적값</mark>, 현재값, 인덱스, 배열) => {
            return <mark>누적값</mark>
        }, 초기값)
    </pre>
    <script>
      const arr = [1, 2, 3, 4, 5];

      const result = arr.reduce((acc, cur, idx, ar) => {
        console.log(acc, cur, idx, ar);
        return acc + cur;
      }, 1);
      console.log(result);
    </script>
