<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리스트</title>
    <style>
      @font-face {
        font-family: "my-font";
        src: url("Cafe24Ohsquare-v2.0.ttf") format("truetype");
      }
      ul {
        list-style-type: none;
      }
      ul li {
        background-color: cadetblue;
        color: black;
        margin: 3px;
      }
    </style>
  </head>
  <body>
    <h1 style="font-family: my-font">리스트</h1>
    <hr />
    <a href="/index.html">홈으로</a>
    <h2 style="font-family: 카페24 아네모네">
      순서가 있는 리스트(Ordered list, list item)
    </h2>
    <h3><strong>커피</strong></h3>
    <!-- ol의 속성 type, start, value -->
    <ol type="a" start="5">
      <li>아메리카노</li>
      <li value="1">라떼</li>
      <li>카푸치노</li>
    </ol>
    <h2 style="font-family: 카페24 아네모네">
      순서가 없는 리스트(Unordered list, list item)
    </h2>
    <h3><strong>과일</strong></h3>
    <ul>
      <li>사과</li>
      <li>복숭아</li>
      <li>수박</li>
      <li>포도</li>
      <li>바나나</li>
    </ul>
  </body>
</html>
