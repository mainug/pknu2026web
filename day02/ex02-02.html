<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>input 응용</title>
  </head>
  <body>
    <h1>input 응용</h1>
    <hr />
    <a href="/index.html">홈으로</a>
    <fieldset>
      <legend>제출 양식</legend>
      <form action="#">
        <label for="input-id">아이디: </label
        ><input
          type="text"
          id="input-id"
          placeholder="아이디 입력"
          title="아이디"
          required
        /><br />
        <label for="input-password">비밀번호: </label
        ><input
          type="password"
          id="input-password"
          placeholder="비밀번호 입력"
          title="비밀번호"
          required
        /><br />
        <input type="submit" />
      </form>
    </fieldset>
    <fieldset>
      <legend>그 외 양식</legend>
      <form action="#">
        <label for="input-date">날짜: </label>
        <input type="date" id="input-date" value="2026-03-16" /><br />
        <label for="input-time">시간: </label>
        <input type="time" id="input-time" value="14:04" /><br />
        <label for="input-time">날짜시간: </label>
        <input
          type="datetime-local"
          id="input-datetime-local"
          value="2026-03-16 14:04"
        /><br />
        <br />
        <label
          for="input-file"
          style="
            padding: 10px;
            padding-left: 20px;
            padding-right: 20px;
            border-radius: 6px;
            background-color: bisque;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
          "
          >+</label
        >
        <input type="file" id="input-file" style="display: none" /><br />
        <br />
        search : <input type="search" /><br />
        email : <input type="email" /><br />
        color : <input type="color" /><br />
        수량1 : <input type="number" min="6" max="12" /><br />
        수량2 :
        <input type="number" min="0" max="20" value="0" step="5" /><br />
        range1 : <input type="range" min="6" max="12" /><br />
        range2 :
        <input type="range" min="0" max="20" value="0" step="5" /><br />
        <input type="hidden" name="외모" value="귀여움" /><br />
        <input type="hidden" name="성격" value="구매욕" /><br />
        <input type="submit" />
      </form>
    </fieldset>
  </body>
</html>
