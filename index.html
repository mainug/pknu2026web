<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html 실습</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f0f4f8;
        color: #333;
        margin: 20px;
      }

      h1 {
        background-color: cadetblue;
        color: white;
        padding: 15px 20px;
        border-radius: 6px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      button.day-btn {
        background: none;
        border: none;
        color: #2f6472;
        font-size: 1.5rem;
        font-weight: 700;
        cursor: pointer;
        padding: 8px 0;
        text-align: left;
        width: 100%;
      }

      button.day-btn:hover {
        color: #1a73e8;
      }

      .examples {
        margin-top: 10px;
        padding-left: 10px;
        display: none;
      }

      .examples a {
        display: inline-block;
        margin: 6px 0;
        text-decoration: none;
        color: #1a73e8;
        font-weight: 600;
        padding: 6px 12px;
        border-radius: 4px;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      .examples a:hover {
        background-color: #1a73e8;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>html 실습</h1>

    <!-- 1일차 -->
    <button
      class="day-btn"
      aria-expanded="false"
      aria-controls="examples-1day"
      id="day1-btn"
    >
      1일차 ▼
    </button>
    <div id="examples-1day" class="examples" aria-labelledby="day1-btn">
      <a href="ex01-01.html">예제 1</a><br />
      <a href="ex01-02.html">예제 2</a><br />
      <a href="ex01-03.html">예제 3</a><br />
      <a href="ex01-04.html">예제 4</a><br />
      <a href="ex01-05.html">예제 5</a><br />
      <a href="ex01-06.html">예제 6</a><br />
      <a href="ex01-07.html">예제 7</a>
    </div>

    <!-- 2일차 -->
    <button
      class="day-btn"
      aria-expanded="false"
      aria-controls="examples-2day"
      id="day2-btn"
    >
      2일차 ▼
    </button>
    <div id="examples-2day" class="examples" aria-labelledby="day2-btn">
      <a href="ex02-01.html">예제 1</a><br />
      <a href="ex02-02.html">예제 2</a><br />
      <a href="ex02-03.html">예제 3</a><br />
      <a href="ex02-04.html">예제 4</a><br />
      <a href="ex02-05.html">예제 5</a><br />
      <a href="ex02-06.html">예제 6</a><br />
      <a href="ex02-07.html">예제 7</a><br />
      <a href="ex02-08.html">예제 8</a><br />
      <a href="ex02-09.html">예제 9</a><br />
      <a href="ex02-10.html">예제 10</a><br />
      <a href="ex02-11.html">예제 11</a><br />
    </div>

    <!-- 3일차 -->
    <button
      class="day-btn"
      aria-expanded="false"
      aria-controls="examples-3day"
      id="day3-btn"
    >
      3일차 ▼
    </button>
    <div id="examples-3day" class="examples" aria-labelledby="day3-btn">
      <a href="ex03-01.html">예제 1</a><br />
      <a href="ex03-02.html">예제 2</a><br />
      <a href="ex03-03.html">예제 3</a><br />
      <a href="ex03-04.html">예제 4</a><br />
      <a href="ex03-05.html">예제 5</a><br />
      <a href="ex03-06.html">예제 6</a><br />
      <a href="ex03-07.html">예제 7</a><br />
      <a href="ex03-08.html">예제 8</a><br />
      <a href="ex03-09.html">예제 9</a><br />
      <a href="ex03-10.html">예제 10</a><br />
      <a href="ex03-11.html">예제 11</a><br />
    </div>

    <script>
      const buttons = document.querySelectorAll("button.day-btn");
      buttons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const contentId = btn.getAttribute("aria-controls");
          const content = document.getElementById(contentId);
          const isVisible = content.style.display === "block";

          // 토글
          content.style.display = isVisible ? "none" : "block";
          btn.setAttribute("aria-expanded", !isVisible);
          btn.textContent = isVisible
            ? btn.textContent.replace("▲", "▼")
            : btn.textContent.replace("▼", "▲");
        });
      });
    </script>
  </body>
</html>
