<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>position fixed</title>
    <style>
      .table-wrapper {
        height: 300px;
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        /* position: fixed; */
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
      }
      thead,
      tfoot {
        background-color: darkslateblue;
        color: white;
        position: sticky;
      }
      thead {
        top: 0;
      }
      tfoot {
        bottom: 0;
      }
      #fix {
        position: fixed;
        left: 850px;
        top: 350px;
        background-color: coral;
        padding: 10px;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        font-size: 2rem;
        color: white;
        text-align: center;
        line-height: 1.1;
        box-shadow: 2px 2px 5px black;
      }
    </style>
  </head>
  <body>
    <h1>position fixed</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <!-- div.table-wrapper>table>thead>tr>th*4^^tbody>(tr>td*4)*10^tfoot>tr>td*4 -->

          </tr>

          </tr>
          <tr>
            <td>3</td>
            <td>김영희</td>

            <td>박</td>
          </tr>
          <tr>

          </tr>
          <tr>

          </tr>
          <tr>
            <td>6</td>

        </tbody>
        <tfoot>
          <tr>

        </tfoot>
      </table>
    </div>
    <div id="fix">^</div>

</html>
