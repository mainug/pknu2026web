<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>flex</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: #a3c9c9;
      }
      header {
        background-color: #7fa6a6;
        text-align: center;
        padding: 15px 0;
        font-size: 2rem;
        font-weight: 400;
      }
      nav {
        background-color: #f2c27d;
        padding: 10px 0;
      }
      main {
        display: flex;
        background-color: #f9f1e7;
        height: 100%;
        box-sizing: border-box;
      }
      aside,
      section {
        flex: 1;
        padding: 15px;
        background-color: #efdfd3;
        box-sizing: border-box;
      }
      article {
        flex: 3;
        background-color: #d3bfa3;
        padding: 15px;
        box-sizing: border-box;
      }
      footer {
        background-color: #7fa6a6;
        text-align: center;
        font-size: 0.8rem;
        padding: 5px 0;
        color: #252525;
      }
    </style>
  </head>
  <body>
    <header>Never</header>
    <nav>nav</nav>
    <main>
      <aside>aside</aside>
      <article>article</article>
      <section>section</section>
    </main>
    <footer>정보처리방침 정책고객센터 Never corp.</footer>
  </body>
</html>
