<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>표 구조 응용</title>
    <style>
      th,
      td {
        border: 2px solid black;
        background-color: antiquewhite;
        padding: 10px;
        width: 100px;
        height: 70px;
      }
      #row-line,
      #col-line {
        background-color: darkcyan;
      }
      .lines {
        background-color: darkolivegreen;
      }
      .bottom-lines {
        color: lightcoral;
      }
      .background {
        background-color: yellow;
      }
      .red {
        color: red;
      }
      .green {
        color: green;
      }
    </style>
  </head>
  <body>
    <h1>표 구조</h1>
    <hr />
    <a href="index.html">홈으로</a>
    <!-- table>tr>th*5^(tr>td*5)*3 -->
    <table>
      <caption>
        표를 아파트 구조처럼 생각해보기
      </caption>
      <tr>
        <th>Line 1</th>
        <th>Line 2</th>
        <th>Line 3</th>
        <th>Line 4</th>
        <th>Line 5</th>
      </tr>
      <tr>
        <td class="lines">1행 1열</td>
        <td class="red">1행 2열</td>
        <td class="red">1행 3열</td>
        <td class="red green">1행 4열</td>
        <td rowspan="2" id="row-line">1행 5열</td>
      </tr>
      <tr>
        <td class="lines">2행 1열</td>
        <td colspan="2" id="col-line">2행 2열</td>
        <td class="green">2행 3열</td>
      </tr>
      <tr>
        <td class="lines bottom-lines">3행 1열</td>
        <td class="bottom-lines">3행 2열</td>
        <td class="bottom-lines background">3행 3열</td>
        <td class="bottom-lines background green">3행 4열</td>
        <td class="bottom-lines background">3행 5열</td>
      </tr>
    </table>
  </body>
</html>
