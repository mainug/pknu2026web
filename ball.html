<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .stage {
        position: relative;
        height: 360px;
        display: flex;
        justify-content: center;
      }
      .floor {
        position: absolute;
        bottom: 0;
        left: 10%;
        right: 10%;
        height: 1.5px;
        background: #ccc;
      }
      .ball {
        position: absolute;
        bottom: 0;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #534ab7;
        transform-origin: center bottom;
        animation: bounce 1.6s linear infinite;
      }
      .ball::after {
        content: "";
        position: absolute;
        top: 20%;
        left: 20%;
        width: 28%;
        height: 28%;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
      }

      @keyframes bounce {
        0% {
          bottom: 280px;
          transform: scaleX(1) scaleY(1);
        }
        48% {
          bottom: 4px;
          transform: scaleX(1) scaleY(1);
        }
        50% {
          bottom: 0;
          transform: scaleX(1.4) scaleY(0.6);
        }
        55% {
          bottom: 0;
          transform: scaleX(0.85) scaleY(1.15);
        }
        60% {
          bottom: 20px;
          transform: scaleX(1) scaleY(1);
        }
        100% {
          bottom: 280px;
          transform: scaleX(1) scaleY(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="ball"></div>
      <div class="floor"></div>
    </div>
  </body>
</html>
